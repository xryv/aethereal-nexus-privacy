<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aethereal Nexus</title>
  <meta name="description" content="Aethereal Nexus - AI systems, automation, and digital experiments." />
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #121821;
      --text: #e8eef7;
      --muted: #9fb0c3;
      --line: #263241;
      --accent: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0b0f14 0%, #101722 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(18, 24, 33, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .links {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Aethereal Nexus</h1>
    <p>
      Aethereal Nexus is a personal project focused on AI systems, automation,
      digital experiments, and content publishing workflows.
    </p>
    <p>
      This website exists to provide essential public information related to the
      project and its associated tools.
    </p>

    <div class="links">
      <p><a href="./privacy.html">Privacy Policy</a></p>
    </div>
  </main>
</body>
</html>
